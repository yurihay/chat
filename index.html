<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#050816" />
<title>Personas Chat</title>
<style>
:root{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#f8fafc;background:#050816}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#25245a 0,transparent 34%),radial-gradient(circle at bottom right,rgba(255,92,138,.22),transparent 32%),#050816}button,input,textarea,select{font:inherit}button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff;border-radius:14px;padding:.72rem .9rem;cursor:pointer}button:hover{background:rgba(255,255,255,.13)}input,textarea,select{width:100%;border:1px solid rgba(255,255,255,.14);background:rgba(15,23,42,.82);color:#fff;border-radius:16px;padding:.9rem 1rem;outline:0}textarea{min-height:90px;resize:vertical}.primary{border:0;background:linear-gradient(135deg,#C77DFF,#FF5C8A);font-weight:900}.site{min-height:100vh}.nav{position:sticky;top:0;z-index:5;display:flex;gap:1rem;align-items:center;padding:.85rem clamp(1rem,4vw,4rem);background:rgba(2,6,23,.74);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.08)}.brand{margin-right:auto;display:flex;gap:.7rem;align-items:center;font-weight:900;background:0;border:0}.brand span,.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,#C77DFF,#FF5C8A)}.nav a{color:#cbd5e1;text-decoration:none}.hero{max-width:1280px;margin:auto;min-height:74vh;display:grid;grid-template-columns:1.05fr .8fr;gap:2rem;align-items:center;padding:clamp(3rem,7vw,7rem) clamp(1rem,5vw,4rem)}.eyebrow{display:inline-flex;padding:.45rem .75rem;border:1px solid rgba(255,255,255,.12);border-radius:999px;color:#f9a8d4;background:rgba(255,255,255,.06);font-weight:900}.hero h1{font-size:clamp(3rem,8vw,7rem);line-height:.88;letter-spacing:-.08em;margin:1rem 0}.hero p,.muted{color:#cbd5e1}.actions,.stats,.row,.tools,.footer-actions{display:flex;gap:.65rem;flex-wrap:wrap;align-items:center}.stats span{padding:.7rem .9rem;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(255,255,255,.05)}.demo,.card,.feature,.step{border:1px solid rgba(255,255,255,.1);background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.035));border-radius:28px;padding:1.1rem}.bubble{padding:.9rem;border-radius:18px;background:rgba(255,255,255,.08)}.bubble.me{margin-left:auto;background:linear-gradient(135deg,#5CC8FF,#9B8CFF);color:#07111f;font-weight:800}.section{max-width:1220px;margin:auto;padding:3.2rem clamp(1rem,5vw,3rem)}.section h2{font-size:clamp(2rem,5vw,4rem);line-height:.95;letter-spacing:-.06em;margin:.8rem 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:1rem}.card{position:relative;overflow:hidden}.avatar{display:grid;place-items:center;width:66px;height:66px;border-radius:22px;background:linear-gradient(135deg,var(--c1),var(--c2));font-size:2rem}.footer{max-width:1220px;margin:auto;padding:2rem clamp(1rem,5vw,3rem) 4rem;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;gap:1rem}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.side{height:100vh;position:sticky;top:0;padding:1rem;display:flex;flex-direction:column;gap:.75rem;background:rgba(2,6,23,.74);border-right:1px solid rgba(255,255,255,.08)}.chat{height:100vh;display:grid;grid-template-rows:auto 1fr auto auto auto}.head{display:flex;align-items:center;gap:.75rem;padding:1rem;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(2,6,23,.6)}.head h2{margin:0}.head button:last-child{margin-left:auto}.messages{overflow:auto;padding:1rem;display:flex;flex-direction:column;gap:.8rem}.msgwrap{max-width:min(760px,95%);display:flex;flex-direction:column;gap:.35rem}.msgwrap.assistant{align-self:flex-start}.msgwrap.user{align-self:flex-end}.msg{padding:.95rem 1.05rem;border-radius:22px;white-space:pre-wrap;word-break:break-word}.assistant .msg{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}.user .msg{background:linear-gradient(135deg,#5CC8FF,#9B8CFF);color:#07111f;font-weight:700}.action{color:#f9a8d4}.msg-actions{display:flex;flex-wrap:wrap;gap:.35rem;opacity:.78}.msg-actions button{font-size:.78rem;padding:.35rem .55rem;border-radius:999px}.count{font-size:.78rem;font-weight:900;background:rgba(255,255,255,.08);border-radius:999px;padding:.35rem .55rem}.composer{display:grid;grid-template-columns:1fr auto;gap:.75rem;padding:1rem;border-top:1px solid rgba(255,255,255,.08)}.composer textarea{min-height:58px}.panel{padding:.8rem}.canon{padding:0 1rem .8rem}.columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}.pill,.diary,pre{background:rgba(255,255,255,.06);border-radius:14px;padding:.75rem;white-space:pre-wrap}.error{margin:.5rem 1rem;padding:.75rem;border-radius:14px;background:rgba(239,68,68,.16);color:#fecaca}.hidden{display:none!important}.form{max-width:860px;padding:clamp(1rem,4vw,3rem);display:flex;flex-direction:column;gap:.8rem}.emoji{display:flex;flex-wrap:wrap;gap:.45rem}@media(max-width:860px){.hero{grid-template-columns:1fr}.nav{flex-wrap:wrap}.app{grid-template-columns:1fr}.side{height:auto;position:relative;flex-direction:row;overflow:auto}.side>*{min-width:max-content}.chat{height:calc(100vh - 94px)}.composer{grid-template-columns:1fr}.footer{flex-direction:column}.msg-actions{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const KEY='personas-chat-standalone-v1';
const starters=[
{id:'vesper',name:'Vesper',emoji:'🜲',color:'#C77DFF',color2:'#FF5C8A',tagline:'Feiticeira do caos. Realidade é só uma sugestão.',greeting:'*o ar treme como vidro rachado* Senta. Me conta o que te trouxe até mim.',persona:'Feiticeira poderosa, melancólica, irônica, protetora e poética.'},
{id:'kai',name:'Kai',emoji:'🎤',color:'#5CC8FF',color2:'#9B8CFF',tagline:'Vocalista de uma banda que ainda não estourou.',greeting:'*ajusta os fones* Você curte música que dói um pouco?',persona:'Vocalista indie reservado, sensível, sincero e inseguro.'},
{id:'nadia',name:'Nadia',emoji:'🕷️',color:'#FF5C8A',color2:'#FF9B5C',tagline:'Ex-agente. Não confia em ninguém — talvez em você.',greeting:'*te observa de braços cruzados* Você é problema, ou solução?',persona:'Ex-agente sarcástica, competente, desconfiada e leal.'},
{id:'hina',name:'Hina',emoji:'🌸',color:'#FF9BC8',color2:'#FFD15C',tagline:'Idol em ascensão e sua maior fã número um é você.',greeting:'*sorri abrindo os braços* Você veio mesmo! Conta tudo!',persona:'Idol energética, calorosa, brincalhona e madura quando precisa.'}
];
const palettes=[['#C77DFF','#FF5C8A'],['#5CC8FF','#9B8CFF'],['#FF5C8A','#FF9B5C'],['#5CFFC8','#5CC8FF'],['#FFD15C','#FF8C5C'],['#FF9BC8','#C77DFF']];
const emojis=['✨','🌙','🔥','🜲','🎭','🦊','⚔️','🌸','🎤','🕷️','👑','🐉'];
let state={view:'home',activeId:null,characters:starters,convos:{},favorites:{},affinity:{},moods:{},memories:{},pinned:{},lorebook:{},diary:{},personas:[],activePersonaId:null,search:'',style:'conversa',director:false,demo:true,error:'',editing:null,editText:'',pinDraft:'',loreDraft:'',charForm:{name:'',tagline:'',greeting:'',persona:'',emoji:'✨',colorIdx:0},personaForm:{name:'',appearance:'',personality:'',emoji:'🌙'}};
try{const saved=JSON.parse(localStorage.getItem(KEY)||'null');if(saved)state={...state,...saved,view:'home',activeId:null,error:''}}catch(e){}
const root=document.getElementById('root');
function save(){localStorage.setItem(KEY,JSON.stringify({...state,view:'home',activeId:null,error:'',editing:null,editText:''}))}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function md(s){return esc(s).replace(/\*([^*]+)\*/g,'<em class="action">$1</em>')}
function active(){return state.characters.find(c=>c.id===state.activeId)}
function messages(){return state.activeId?(state.convos[state.activeId]||[]):[]}
function set(p){state={...state,...p};save();render()}
function openChat(id){const c=state.characters.find(x=>x.id===id);if(!c)return;state.activeId=id;state.view='chat';state.error='';if(!state.convos[id]?.length)state.convos[id]=[{role:'assistant',content:c.greeting,variants:[c.greeting],vi:0}];save();render();setTimeout(()=>{const m=document.querySelector('.messages');if(m)m.scrollTop=m.scrollHeight},50)}
function replyText(history,variant=0){const c=active();const last=[...history].reverse().find(m=>m.role==='user')?.content||'';const mood=state.moods[state.activeId]||'neutro';const aff=state.affinity[state.activeId]||0;const intro=['*o clima muda entre vocês*','*um silêncio breve pesa no ar*','*o personagem respira antes de responder*'][variant%3];const close=aff>60?'Eu confio em você.':aff>25?'Quero entender melhor você.':'Ainda vou com calma.';if(state.style==='rapido')return `${intro} Entendi. ${close}`;return `${intro}\n\nVocê disse: “${last}”. Meu humor está ${mood}. ${close}\n\n${variant%3===0?'Continua. Isso ficou interessante.':variant%3===1?'Talvez exista algo maior por trás disso.':'Agora a cena pede uma escolha.'}${state.director?'\n\n*O modo diretor empurra a cena para uma decisão importante.*':''}`}
function send(){const inp=document.getElementById('msgInput');const text=(inp?.value||'').trim();if(!text||!active())return;if(inp)inp.value='';const cmd=text.toLowerCase();if(cmd==='/destino')return addAssistant('*Destino lançado:* '+['Uma verdade aparece.','Algo muda no ambiente.','Um risco se aproxima.','Uma escolha difícil surge.'][Math.floor(Math.random()*4)]);if(cmd==='/resumo')return summary();if(cmd==='/diario')return diary();if(cmd==='/diretor'){state.director=!state.director;return addAssistant('*Modo diretor alternado.*')}if(cmd.startsWith('/humor ')){state.moods[state.activeId]=cmd.replace('/humor ','').trim();return addAssistant('*Humor alterado.*')}let hist=[...messages(),{role:'user',content:text}];state.convos[state.activeId]=hist;state.affinity[state.activeId]=Math.min(100,(state.affinity[state.activeId]||0)+1);const r=replyText(hist,0);state.convos[state.activeId]=[...hist,{role:'assistant',content:r,variants:[r],vi:0}];if(hist.filter(m=>m.role==='user').length%3===0)refreshMemory();save();render()}
function addAssistant(content){state.convos[state.activeId]=[...messages(),{role:'assistant',content,variants:[content],vi:0}];save();render()}
function editMsg(i){state.editing=i;state.editText=messages()[i].content;render()}
function saveEdit(){const i=state.editing;if(i==null)return;const arr=[...messages()];const msg={...arr[i],content:state.editText.trim()};if(msg.variants?.length){msg.variants=[...msg.variants];msg.variants[msg.vi||0]=msg.content}arr[i]=msg;state.convos[state.activeId]=arr;state.editing=null;state.editText='';save();render()}
function delMsg(i){if(!confirm('Apagar esta mensagem?'))return;const arr=[...messages()];arr.splice(i,1);state.convos[state.activeId]=arr;state.editing=null;save();render()}
function swipe(i,dir){const arr=[...messages()];const msg={...arr[i]};const v=msg.variants||[msg.content];if(v.length<2)return;msg.vi=((msg.vi||0)+dir+v.length)%v.length;msg.content=v[msg.vi];arr[i]=msg;state.convos[state.activeId]=arr;save();render()}
function regen(i){const arr=[...messages()];const msg={...arr[i]};const variant=(msg.variants?.length||1);const r=replyText(arr.slice(0,i),variant);const v=msg.variants?.length?[...msg.variants]:[msg.content];v.push(r);msg.variants=v;msg.vi=v.length-1;msg.content=r;arr[i]=msg;state.convos[state.activeId]=arr;save();render()}
function summary(){const c=active();const s=`Resumo: conversa com ${c.name}, ${messages().length} mensagens, humor ${state.moods[state.activeId]||'neutro'}.`;state.pinned[state.activeId]=[...(state.pinned[state.activeId]||[]),s];addAssistant('*Resumo criado e fixado.*')}
function diary(){const c=active();const d=`Hoje ${c.name} pensou sobre você com curiosidade e cautela.`;state.diary[state.activeId]=[...(state.diary[state.activeId]||[]),d];addAssistant('*Nova entrada no diário secreto.*')}
function refreshMemory(){const facts=messages().slice(-8).filter(m=>m.role==='user').map(m=>'- Usuário disse: '+m.content.slice(0,120)).join('\n');state.memories[state.activeId]=facts||'Sem fatos novos ainda.';save();render()}
function createChar(){const f=state.charForm;if(!f.name.trim())return;const p=palettes[f.colorIdx]||palettes[0];const c={id:'u_'+Date.now(),name:f.name.trim(),emoji:f.emoji,color:p[0],color2:p[1],tagline:f.tagline||'Um personagem criado por você.',greeting:f.greeting||`*te observa* Olá. Eu sou ${f.name}.`,persona:f.persona||`Personagem original chamado ${f.name}.`};state.characters=[c,...state.characters];state.charForm={name:'',tagline:'',greeting:'',persona:'',emoji:'✨',colorIdx:0};save();openChat(c.id)}
function createPersona(){const f=state.personaForm;if(!f.name.trim())return;const p=palettes[f.colorIdx]||palettes[1];const per={id:'p_'+Date.now(),name:f.name.trim(),emoji:f.emoji,color:p[0],color2:p[1],appearance:f.appearance,personality:f.personality};state.personas=[...state.personas,per];state.activePersonaId=per.id;state.personaForm={name:'',appearance:'',personality:'',emoji:'🌙',colorIdx:1};save();render()}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='personas-chat-backup.json';a.click();URL.revokeObjectURL(a.href)}
function importData(e){const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{state={...state,...JSON.parse(r.result),view:'home',activeId:null};save();render()}catch{alert('Backup inválido')}};r.readAsText(file)}
function fav(id){state.favorites[id]=!state.favorites[id];save();render()}
function dup(id){const c=state.characters.find(x=>x.id===id);if(c){state.characters=[{...c,id:'u_'+Date.now(),name:c.name+' cópia'},...state.characters];save();render()}}
function setForm(type,key,val){state[type][key]=val;save();render()}
function renderHome(){const q=state.search.toLowerCase();const chars=[...state.characters].sort((a,b)=>Number(!!state.favorites[b.id])-Number(!!state.favorites[a.id])).filter(c=>!q||(c.name+c.tagline+c.persona).toLowerCase().includes(q));root.innerHTML=`<main class="site"><nav class="nav"><button class="brand" onclick="renderHome()"><span>✦</span>Personas Chat</button><a href="#recursos">Recursos</a><a href="#personagens">Personagens</a><button class="primary" onclick="openChat('${state.characters[0].id}')">Abrir chat</button></nav><section class="hero"><div><span class="eyebrow">Roleplay · Memória · Lorebook</span><h1>Personagens que lembram, sentem e evoluem.</h1><p>Um site-app de conversas narrativas com edição de diálogos, apagar mensagens, nova resposta, variações e swipe no celular.</p><div class="actions"><button class="primary" onclick="openChat('${state.characters[0].id}')">Começar agora</button><button onclick="set({view:'create'})">Criar personagem</button></div><div class="stats"><span><b>${state.characters.length}</b> personagens</span><span><b>${Object.values(state.convos).flat().length}</b> mensagens</span></div></div><div class="demo"><b>🜲 Vesper</b><p class="bubble assistant">*a sala respira como vidro rachado* Você trouxe uma pergunta... ou uma ferida?</p><p class="bubble me">Eu queria criar uma história diferente.</p><p class="bubble assistant">Então vamos fazer do jeito certo: com memória e consequência.</p></div></section><section id="recursos" class="section"><span class="eyebrow">Recursos</span><h2>Um pequeno estúdio de histórias.</h2><div class="grid">${['🧠 Memória viva','📚 Lorebook','🎭 Persona do usuário','🎲 Dado do destino','🔥 Humor e afinidade','↻ Variações de resposta'].map(x=>`<div class="feature"><h3>${x}</h3><p class="muted">Recurso integrado ao chat e salvo no navegador.</p></div>`).join('')}</div></section><section id="personagens" class="section"><h2>Personagens</h2><input placeholder="Buscar personagem..." value="${esc(state.search)}" oninput="state.search=this.value;save();renderHome()"><br><br><div class="grid">${chars.map(c=>`<article class="card" style="--c1:${c.color};--c2:${c.color2}"><div class="avatar">${c.emoji}</div><h3>${esc(c.name)}</h3><p>${esc(c.tagline)}</p><small>${state.convos[c.id]?.filter(m=>m.role==='user').length||0} mensagens · Afinidade ${state.affinity[c.id]||0}/100</small><div class="row"><button class="primary" onclick="openChat('${c.id}')">Conversar</button><button onclick="fav('${c.id}')">${state.favorites[c.id]?'★':'☆'}</button><button onclick="dup('${c.id}')">Duplicar</button></div></article>`).join('')}</div></section><footer class="footer"><div><b>Personas Chat</b><p class="muted">Standalone para GitHub Pages.</p></div><div class="footer-actions"><button onclick="exportData()">Exportar backup</button><label><button onclick="document.getElementById('backup').click()">Importar backup</button><input id="backup" type="file" accept="application/json" hidden onchange="importData(event)"></label></div></footer></main>`}
function renderChat(){const c=active();let tx=0;root.innerHTML=`<main class="app"><aside class="side"><button class="brand" onclick="set({view:'home',activeId:null})"><span class="logo">✦</span><b>Site</b></button><button class="primary" onclick="set({view:'create'})">+ Personagem</button><button onclick="set({view:'persona'})">Persona</button><button onclick="set({view:'settings'})">Configurações</button><button onclick="exportData()">Exportar</button><select onchange="state.style=this.value;save()"><option ${state.style==='conversa'?'selected':''} value="conversa">💬 Conversa</option><option ${state.style==='cena'?'selected':''} value="cena">🎬 Cena</option><option ${state.style==='rapido'?'selected':''} value="rapido">⚡ Rápido</option></select><label><input type="checkbox" ${state.director?'checked':''} onchange="state.director=this.checked;save()"> Modo diretor</label></aside><section class="chat"><header class="head"><button onclick="set({view:'home',activeId:null})">← Site</button><div class="avatar" style="--c1:${c.color};--c2:${c.color2};width:48px;height:48px;font-size:1.4rem">${c.emoji}</div><div><h2>${esc(c.name)}</h2><small>${state.moods[state.activeId]||'neutro'} · Afinidade ${state.affinity[state.activeId]||0}/100</small></div><button onclick="state.convos[state.activeId]=[{role:'assistant',content:active().greeting,variants:[active().greeting],vi:0}];save();render()">Limpar</button></header><div class="messages">${messages().map((m,i)=>{const v=m.variants||[m.content];const has=m.role==='assistant'&&v.length>1;return `<div class="msgwrap ${m.role}" data-i="${i}"><div class="msg">${state.editing===i?`<textarea id="editbox">${esc(state.editText)}</textarea>`:md(m.content)}</div><div class="msg-actions">${has?`<button onclick="swipe(${i},-1)">‹</button><span class="count">${(m.vi||0)+1}/${v.length}</span><button onclick="swipe(${i},1)">›</button>`:''}${m.role==='assistant'&&i>0?`<button onclick="regen(${i})">↻ Nova resposta</button>`:''}${state.editing===i?`<button onclick="state.editText=document.getElementById('editbox').value;saveEdit()">Salvar</button><button onclick="state.editing=null;render()">Cancelar</button>`:`<button onclick="editMsg(${i})">Editar</button><button onclick="delMsg(${i})">Apagar</button>`}</div></div>`}).join('')}</div>${state.error?`<div class="error">${esc(state.error)}</div>`:''}<div class="tools"><button onclick="rollDestiny()">🎲 destino</button><button onclick="summary()">🧾 resumo</button><button onclick="diary()">📓 diário</button><button onclick="refreshMemory()">🧠 memória</button>${['calmo','feliz','triste','irritado','vulnerável'].map(m=>`<button onclick="state.moods[state.activeId]='${m}';addAssistant('*Humor alterado para: ${m}.*')">${m}</button>`).join('')}</div><div class="canon"><details><summary>Memória, pins, lorebook e diário</summary><div class="columns"><div><h3>Memória</h3><pre>${esc(state.memories[state.activeId]||'Sem memória.')}</pre></div><div><h3>Pins</h3><textarea id="pin" placeholder="Momento canônico..."></textarea><button onclick="const v=document.getElementById('pin').value.trim();if(v){state.pinned[state.activeId]=[...(state.pinned[state.activeId]||[]),v];save();render()}">Fixar</button>${(state.pinned[state.activeId]||[]).map(p=>`<p class="pill">${esc(p)}</p>`).join('')}</div><div><h3>Lorebook</h3><textarea id="lore" placeholder="Regra do mundo..."></textarea><button onclick="const v=document.getElementById('lore').value.trim();if(v){state.lorebook[state.activeId]=[...(state.lorebook[state.activeId]||[]),v];save();render()}">Adicionar</button>${(state.lorebook[state.activeId]||[]).map(p=>`<p class="pill">${esc(p)}</p>`).join('')}</div><div><h3>Diário secreto</h3>${(state.diary[state.activeId]||[]).map(p=>`<p class="diary">${esc(p)}</p>`).join('')}</div></div></details></div><footer class="composer"><textarea id="msgInput" placeholder="Digite... /destino, /resumo, /diario, /diretor, /humor calmo"></textarea><button class="primary" onclick="send()">Enviar</button></footer></section></main>`;document.getElementById('msgInput')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});document.querySelectorAll('.msgwrap.assistant').forEach(el=>{el.ontouchstart=e=>tx=e.touches[0].clientX;el.ontouchend=e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>55)swipe(Number(el.dataset.i),d<0?1:-1)}});setTimeout(()=>{const m=document.querySelector('.messages');if(m)m.scrollTop=m.scrollHeight},20)}
function renderForm(kind){const isChar=kind==='create';const f=isChar?state.charForm:state.personaForm;root.innerHTML=`<main class="app"><aside class="side"><button onclick="set({view:'home'})">← Site</button></aside><section class="form"><h1>${isChar?'Criar personagem':'Persona do usuário'}</h1><input placeholder="Nome" value="${esc(f.name)}" oninput="setForm('${isChar?'charForm':'personaForm'}','name',this.value)">${isChar?`<input placeholder="Tagline" value="${esc(f.tagline)}" oninput="setForm('charForm','tagline',this.value)"><textarea placeholder="Saudação" oninput="setForm('charForm','greeting',this.value)">${esc(f.greeting)}</textarea><textarea placeholder="Persona/prompt" oninput="setForm('charForm','persona',this.value)">${esc(f.persona)}</textarea>`:`<textarea placeholder="Aparência" oninput="setForm('personaForm','appearance',this.value)">${esc(f.appearance)}</textarea><textarea placeholder="Personalidade" oninput="setForm('personaForm','personality',this.value)">${esc(f.personality)}</textarea>`}<div class="emoji">${emojis.map(e=>`<button onclick="setForm('${isChar?'charForm':'personaForm'}','emoji','${e}')">${e}</button>`).join('')}</div><button class="primary" onclick="${isChar?'createChar()':'createPersona()'}">Salvar</button></section></main>`}
function renderSettings(){root.innerHTML=`<main class="app"><aside class="side"><button onclick="set({view:'home'})">← Site</button></aside><section class="form"><h1>Configurações</h1><p class="muted">Esta versão standalone abre direto no GitHub Pages e usa modo demo local.</p><label><input type="checkbox" ${state.demo?'checked':''} onchange="state.demo=this.checked;save()"> Modo demo</label><label><input type="checkbox" ${state.director?'checked':''} onchange="state.director=this.checked;save()"> Modo diretor</label></section></main>`}
function render(){if(state.view==='chat')return renderChat();if(state.view==='create')return renderForm('create');if(state.view==='persona')return renderForm('persona');if(state.view==='settings')return renderSettings();return renderHome()}
render();
